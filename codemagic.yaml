workflows:
  android-ios-release:
    name: SumoBee Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.22.2
      # Explicitly use Java 17 for stability with Flutter 3.22
      vars:
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home
      groups:
        - google_play_credentials # Optional
        - app_store_credentials # Optional
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Get Flutter packages
        script: |
          cd mobile
          # Force clean slate for iOS builds on CI
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          flutter pub get
          cd ios && pod install --repo-update && cd ..
      - name: Build Android APK
        script: |
          cd mobile
          flutter build apk --release
      - name: Build iOS IPA
        script: |
          cd mobile
          # Ensure generated files are reconstructed correctly
          flutter build ios --release --no-codesign
    artifacts:
      - mobile/build/app/outputs/flutter-apk/*.apk
      - mobile/build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - user@example.com # Replace with user email
